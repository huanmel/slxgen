# Fan Mode Control
#
# PlantUML-first workflow example — see docs/workflow.md §1.3
# Draft topology: fan_ctrl_draft.puml
# Compare draft vs. generated: run gen_fan_ctrl.py with PUML_ONLY=True
#
# Hierarchy:
#   STANDBY                    — fan off; idle state
#   ACTIVE (compound)          — fan running; exits on ~fan_on
#     A_ENTRY (default)        — immediate routing: BOOST or NORMAL on entry
#     BOOST                    — override mode; speed locked to HIGH
#     NORMAL (compound)        — normal speed control
#       N_ENTRY (default)      — immediate routing: AUTO or MANUAL (uses hist_auto)
#       AUTO                   — controller selects speed
#       MANUAL (history)       — user-selected speed; resumes last active level
#         INIT (default)       — hold speed; wait for first button press
#         LOW / MED / HIGH     — active speed level

name: FanCtrl

inputs:
  - {name: debTout,    type: uint8}
  - {name: fan_on,     type: boolean}   # fan system active
  - {name: boost_req,  type: boolean}   # boost override request (level signal)
  - {name: mode2auto,  type: boolean}   # AUTO mode request
  - {name: mode2manual,type: boolean}   # any speed button pressed
  - {name: low_press,  type: boolean}   # LOW speed button
  - {name: med_press,  type: boolean}   # MED speed button
  - {name: high_press, type: boolean}   # HIGH speed button

outputs:
  - {name: fan_mode, type: "Enum: FanMode_e"}
  - {name: fan_spd,  type: "Enum: FanSpd_e"}

locals:
  - {name: hist_auto, type: boolean, initial_value: true}  # last active NORMAL branch

enums:
  FanMode_e:
    storage: int8
    default: STANDBY
    members:
      STANDBY: 0
      BOOST:   1
      AUTO:    2
      MANUAL:  3
  FanSpd_e:
    storage: int8
    default: 'OFF'
    members:
      'OFF': 0
      LOW:   1
      MED:   2
      HIGH:  3

states:
  STANDBY:
    default: true
    desc: Fan system idle. All outputs de-energised; unit waits for fan_on activation.
    req: REQ-FAN-001
    en: |-
      fan_mode=FanMode_e.STANDBY;
      fan_spd=FanSpd_e.OFF;
  ACTIVE:
    desc: Fan system running. Speed and mode driven by sub-state selection.
    req: [REQ-FAN-002, REQ-FAN-003]
    states:
      A_ENTRY:
        default: true
      BOOST:
        desc: Forced-HIGH override. Remains active as long as boost_req is asserted.
        req: REQ-FAN-010
        en: |-
          fan_mode=FanMode_e.BOOST;
          fan_spd=FanSpd_e.HIGH;
      NORMAL:
        desc: Normal closed-loop speed control. Routes to AUTO or MANUAL sub-mode.
        req: REQ-FAN-011
        states:
          N_ENTRY:
            default: true
          AUTO:
            desc: Controller-managed speed selection.
            req: REQ-FAN-020
            en: |-
              fan_mode=FanMode_e.AUTO;
              hist_auto=true;
          MANUAL:
            desc: User-selected speed level. History junction restores last active level on re-entry.
            req: REQ-FAN-021
            history: true
            subchart: true
            en: |-
              fan_mode=FanMode_e.MANUAL;
              hist_auto=false;
            states:
              INIT:
                default: true
              LOW:
                en: fan_spd=FanSpd_e.LOW;
              MED:
                en: fan_spd=FanSpd_e.MED;
              HIGH:
                en: fan_spd=FanSpd_e.HIGH;

transitions:

  # STANDBY ↔ ACTIVE
  - from: STANDBY
    to: ACTIVE
    trigger: "after(debTout,tick)"
    condition: "fan_on"
    order: '1'
    req: REQ-FAN-030
    desc: Fan activation after debounce. Enters ACTIVE and routes immediately via A_ENTRY.
  - from: ACTIVE
    to: STANDBY
    trigger: "after(debTout,tick)"
    condition: "~fan_on"
    order: '1'
    req: REQ-FAN-031
    desc: Fan shutdown. fan_on de-asserted; returns to idle after debounce.

  # A_ENTRY: immediate routing (no trigger)
  - {from: "ACTIVE.A_ENTRY",         to: "ACTIVE.BOOST",       condition: "boost_req",         order: '1'}
  - {from: "ACTIVE.A_ENTRY",         to: "ACTIVE.NORMAL",      condition: "~boost_req",        order: '2'}

  # NORMAL compound ↔ BOOST
  - {from: "ACTIVE.NORMAL",          to: "ACTIVE.BOOST",       trigger: "after(debTout,tick)", condition: "boost_req",  order: '1'}
  - {from: "ACTIVE.BOOST",           to: "ACTIVE.NORMAL",      trigger: "after(debTout,tick)", condition: "~boost_req", order: '1'}

  # N_ENTRY: immediate routing (no trigger)
  - {from: "ACTIVE.NORMAL.N_ENTRY",  to: "ACTIVE.NORMAL.AUTO",   condition: "mode2auto || (hist_auto && ~mode2manual)", order: '1'}
  - {from: "ACTIVE.NORMAL.N_ENTRY",  to: "ACTIVE.NORMAL.MANUAL", condition: "mode2manual || ~hist_auto",                order: '2'}

  # AUTO ↔ MANUAL
  - {from: "ACTIVE.NORMAL.AUTO",     to: "ACTIVE.NORMAL.MANUAL", trigger: "after(debTout,tick)", condition: "mode2manual", order: '1'}
  - {from: "ACTIVE.NORMAL.MANUAL",   to: "ACTIVE.NORMAL.AUTO",   trigger: "after(debTout,tick)", condition: "mode2auto",   order: '1'}

  # MANUAL.INIT → speed selection
  - {from: "ACTIVE.NORMAL.MANUAL.INIT", to: "ACTIVE.NORMAL.MANUAL.LOW",  trigger: "after(debTout,tick)", condition: "low_press",  order: '1'}
  - {from: "ACTIVE.NORMAL.MANUAL.INIT", to: "ACTIVE.NORMAL.MANUAL.MED",  trigger: "after(debTout,tick)", condition: "med_press",  order: '2'}
  - {from: "ACTIVE.NORMAL.MANUAL.INIT", to: "ACTIVE.NORMAL.MANUAL.HIGH", trigger: "after(debTout,tick)", condition: "high_press", order: '3'}

  # MANUAL: speed ↔ speed
  - {from: "ACTIVE.NORMAL.MANUAL.LOW",  to: "ACTIVE.NORMAL.MANUAL.MED",  trigger: "after(debTout,tick)", condition: "med_press",  order: '1'}
  - {from: "ACTIVE.NORMAL.MANUAL.LOW",  to: "ACTIVE.NORMAL.MANUAL.HIGH", trigger: "after(debTout,tick)", condition: "high_press", order: '2'}
  - {from: "ACTIVE.NORMAL.MANUAL.MED",  to: "ACTIVE.NORMAL.MANUAL.LOW",  trigger: "after(debTout,tick)", condition: "low_press",  order: '1'}
  - {from: "ACTIVE.NORMAL.MANUAL.MED",  to: "ACTIVE.NORMAL.MANUAL.HIGH", trigger: "after(debTout,tick)", condition: "high_press", order: '2'}
  - {from: "ACTIVE.NORMAL.MANUAL.HIGH", to: "ACTIVE.NORMAL.MANUAL.LOW",  trigger: "after(debTout,tick)", condition: "low_press",  order: '1'}
  - {from: "ACTIVE.NORMAL.MANUAL.HIGH", to: "ACTIVE.NORMAL.MANUAL.MED",  trigger: "after(debTout,tick)", condition: "med_press",  order: '2'}
